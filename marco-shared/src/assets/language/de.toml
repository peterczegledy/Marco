about_app_name = "Marco"
about_tagline = "Schneller schreiben. Klarer denken."
about_version = "Version {version}"
about_description = "Ein schneller, nativer Markdown-Editor in Rust mit Live-Vorschau.\n\nVollständig CommonMark-kompatibel mit einem eigens entwickelten Parser für feingranulare Kontrolle. Bietet native Leistung durch GTK4, läuft plattformübergreifend auf Linux und Windows und bietet eine synchronisierte Live-Vorschau beim Tippen.\n\nUnterstützt GFM-Tabellen, Aufgabenlisten, Fußnoten, Überschriften-IDs, Autolinks, Durchstreichung, benutzerdefinierte Inline-Elemente und mehr.\n\nEntwickelt mit Rust, GTK4, WebKit6/WebView2, SourceView5, nom Parser und Cairo."
