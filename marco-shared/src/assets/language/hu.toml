about_app_name = "Marco"
about_tagline = "Írj gyorsabban. Gondolkodj tisztábban."
about_version = "Verzió {version}"
about_description = "Egy gyors, natív Markdown-szerkesztő, amely Rustban készült, élő előnézettel.\n\nTeljesen CommonMark-kompatibilis, egyedileg fejlesztett értelmezővel a finomhangolt vezérlés érdekében. Natív teljesítményt nyújt a GTK4-en keresztül, platformfüggetlenül működik Linuxon és Windowson, és élő, szinkronizált előnézetet biztosít gépelés közben.\n\nTámogatja a GFM-táblázatokat, feladatlistákat, lábjegyzeteket, címsor-azonosítókat, automatikus hivatkozásokat, áthúzást, egyéni beágyazott elemeket és egyebeket.\n\nRust, GTK4, WebKit6/WebView2, SourceView5, nom Parser és Cairo segítségével készült."
about_resources_title = "Erőforrások"
about_link_github = "GitHub"
about_link_issues = "Hibák"
about_link_discuss = "Megvitatás"
about_link_changelog = "Módosítás napló"
about_link_website = "skovrasmussen.com"
about_license_text = "MIT Licenc\n\nEzennel ingyenesen engedélyt adunk bármely személynek, aki a szoftver és a kapcsolódó dokumentációs fájlok (a továbbiakban: „Szoftver”) másolatát megszerzi, hogy korlátozás nélkül kezelje a Szoftvert, beleértve korlátozás nélkül a Szoftver használatának, másolásának, módosításának, egyesítésének, közzétételének, terjesztésének, allicencbe adásának és/vagy másolatainak értékesítésének jogát, valamint hogy engedélyezzük a Szoftvert birtokló személyek számára mindezek megtételét a következő feltételek mellett.\n\nA fenti szerzői jogi nyilatkozatot és ezt az engedélyezési nyilatkozatot a Szoftver minden másolatában vagy jelentős részében szerepeltetni kell.\n\nA SZOFTVERT „JELENLEGI ÁLLAPOTBAN” BOCSÁTJUK, BÁRMILYEN KIFEJEZETT VAGY VÉLELMEZETT GARANCIA NÉLKÜL, BELEÉRTVE, DE NEM KIZÁRÓLAGOSAN AZ ELADHATÓSÁGRA, EGY ADOTT CÉLRA VALÓ ALKALMASSÁGRA ÉS A JOGTISZTÁSRA VONATKOZÓ GARANCIÁKAT. A SZERZŐK VAGY A SZERZŐI JOGOK TULAJDONOSAINAK SEMMILYEN ESETBEN SEM FELELŐSEK SEMMILYEN IGÉNYÉRT, KÁRÉRT VAGY EGYÉB FELELŐSSÉGÉRT, AKÁR SZERZŐDÉSES, SZERZŐDÉSEN KÍVÜLI VAGY EGYÉB KERESETBŐL SZÁRMAZIK, AMELY A SZOFTVERBŐL, A SZOFTVER HASZNÁLATÁBÓL VAGY EGYÉB ÜGYLETEIBŐL ERED, AZZAL KAPCSOLATBAN VAN."
about_copyright = "Copyright © 2025 - 2026 Kim Skov Rasmussen"
