name: Release (Linux & Windows)

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build Linux .deb
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain (pinned)
        id: toolchain
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-linux-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3 \
            build-essential pkg-config \
            libgtk-4-dev libgtksourceview-5-dev libwebkitgtk-6.0-dev libfontconfig-dev \
            dpkg-dev fakeroot gzip \
            imagemagick

      - name: Build Debian package
        run: |
          bash build/linux/build_deb.sh --no-bump

      - name: List produced artifacts
        run: |
          set -euo pipefail
          echo "Installer directory contents:"
          ls -lah build/installer/
          echo "---"
          ls -lah build/installer/*.deb || true

      - name: Prepare artifact name
        id: prep
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json;print(json.load(open("build/version.json"))["linux"]["marco"])')"
          release_deb="build/installer/marco-suite_${version}_linux_amd64.deb"

          if [ ! -f "$release_deb" ]; then
            echo "ERROR: expected release artifact not found: $release_deb" >&2
            echo "Available .deb files:" >&2
            ls -lah build/installer/*.deb >&2 || true
            exit 1
          fi

          echo "release_deb=$release_deb" >> "$GITHUB_OUTPUT"

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-deb
          path: ${{ steps.prep.outputs.release_deb }}
          retention-days: 1

  build-windows:
    name: Build Windows portable
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install Rust toolchain (pinned)
        id: toolchain
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Install GNU target
        run: rustup target add x86_64-pc-windows-gnu

      - name: Setup MSYS2 with GTK4
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-gtksourceview5
            mingw-w64-ucrt-x86_64-librsvg
            mingw-w64-ucrt-x86_64-cairo
            mingw-w64-ucrt-x86_64-gdk-pixbuf2
            mingw-w64-ucrt-x86_64-pkg-config
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Setup build environment
        shell: powershell
        run: |
          $msys2 = "${{ steps.msys2.outputs.msys2-location }}"
          Write-Host "MSYS2 location: $msys2"

          # Add MSYS2 UCRT64 bin to PATH so pkg-config can be found
          "$msys2\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "$msys2\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          # Set PKG_CONFIG_PATH for GTK libraries
          "PKG_CONFIG_PATH=$msys2\ucrt64\lib\pkgconfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          
          # Allow pkg-config to work with GNU target (not true cross-compilation)
          "PKG_CONFIG_ALLOW_CROSS=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/windows
          key: cargo-windows-${{ steps.toolchain.outputs.cachekey }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build portable package
        shell: powershell
        run: |
          $msys2 = "${{ steps.msys2.outputs.msys2-location }}"
          Write-Host "Testing windres..."
          windres --version
          pwsh -NoProfile -ExecutionPolicy Bypass -File build/windows/build_portable.ps1 -Msys2Root "$msys2"

      - name: List produced artifacts
        shell: powershell
        run: |
          Write-Host "Installer directory contents:"
          Get-ChildItem -Path "build/installer/" -Recurse | Format-Table -AutoSize

      - name: Prepare artifact name
        id: prep
        shell: powershell
        run: |
          $version = (Get-Content build/version.json | ConvertFrom-Json).windows.marco
          $releaseZip = "build/installer/marco-suite_${version}_windows_amd64.zip"

          if (-not (Test-Path $releaseZip)) {
            Write-Error "Expected release artifact not found: $releaseZip"
            Write-Host "Available ZIP files:"
            Get-ChildItem -Path "build/installer/" -Filter "*.zip" -Recurse
            exit 1
          }

          # Output for GitHub Actions
          "release_zip=$releaseZip" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-zip
          path: ${{ steps.prep.outputs.release_zip }}
          retention-days: 1

  release:
    name: Create versioned release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    concurrency:
      group: release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          version="$(python3 -c 'import json;print(json.load(open("build/version.json"))["linux"]["marco"])')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}" >> "$GITHUB_OUTPUT"

      - name: Create and push version tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          # Check whether tag already exists on the remote.
          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
            echo "ERROR: Tag ${tag} already exists. Bump the version in build/version.json before releasing." >&2
            exit 1
          fi

          # Create the tag via the REST API. Using the API (instead of `git push`)
          # avoids the GITHUB_TOKEN `workflows` scope restriction that blocks
          # pushing refs which point at commits modifying .github/workflows/*.
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/tags/${tag}" \
            -f sha="${GITHUB_SHA}"

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-deb
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-zip
          path: artifacts/

      - name: List downloaded artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -lah artifacts/
          echo "---"
          echo "Files to upload:"
          find artifacts/ -type f -exec ls -lh {} \;

      - name: Verify artifacts exist
        run: |
          set -euo pipefail
          if [ ! -f artifacts/*.deb ]; then
            echo "ERROR: No .deb file found in artifacts/" >&2
            exit 1
          fi
          if [ ! -f artifacts/*.zip ]; then
            echo "ERROR: No .zip file found in artifacts/" >&2
            exit 1
          fi
          echo "✓ All required artifacts present"

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.version.outputs.tag }}
          name: Marco Suite ${{ steps.version.outputs.version }}
          prerelease: false
          allowUpdates: false
          artifactErrorsFailBuild: true
          commit: ${{ github.sha }}
          artifacts: "artifacts/*.deb,artifacts/*.zip"
          body: |
            ## Marco Suite ${{ steps.version.outputs.version }}

            See the per-app changelogs below for the full list of user-visible changes in this release.

            > Marco and Polo are built on top of the [`marco-core`](https://crates.io/crates/marco-core) crate, which is developed and released independently in its [own repository](https://github.com/Ranrar/marco-core).

            ### Highlights

            **`marco-core` is now a standalone crate**
            The parser, AST, HTML renderer, and editor-intelligence features have been extracted into the [`marco-core`](https://crates.io/crates/marco-core) crate, published independently on crates.io and maintained in its [own repository](https://github.com/Ranrar/marco-core). Both Marco and Polo now consume it as a pinned dependency. No user-visible behavior change — this lays the groundwork for other tools to build on the same engine.

            **Polo redesign**
            Polo received a significant visual and feature overhaul. A new icon toolbar (Open, Open in Marco, Toggle TOC, Print, Light/Dark toggle) sits below the titlebar. A Table of Contents side panel auto-populates from document headings and lets you jump to any section with a single click. File → Open Recent lets you reopen documents without navigating the file chooser. File → Print (Ctrl+P) opens the native print dialog on both Linux and Windows.

            **Rendering progress overlay for large files**
            Both Marco and Polo now show a "Rendering…" overlay with an indeterminate progress bar while large documents are loading. The indicator stays visible until the preview has fully painted, so long opens no longer look like a frozen window. It adapts to the active light/dark theme.

            ### What's new in Marco

            - Multi-layer parse and render cache (HTML, AST, section, TOC, diagnostics) backed by Moka TinyLFU — frequently edited sections are served from cache without re-parsing.
            - Section-based incremental preview rendering: only changed sections are patched into the DOM; full-page rebuilds happen only on the first render of a document.
            - Localization expanded: Lists and Mention insert dialogs are now fully translatable; German (`de`) locale updated. Language changes now apply at runtime to menus, toolbar, footer, dialogs, and titlebar tooltips without a restart.

            ### What's new in Polo

            - File-based logging, matching Marco's logger — daily log files under `log/YYYYMM/YYMMDD.log`.
            - CSS theming rewritten as a programmatic Rust generator aligned with Marco's palette, keeping light and dark mode colors consistent across both apps.

            ### Changelogs
            - [Marco ${{ steps.version.outputs.version }}](https://github.com/Ranrar/Marco/blob/v${{ steps.version.outputs.version }}/changelog/marco.md)
            - [Polo ${{ steps.version.outputs.version }}](https://github.com/Ranrar/Marco/blob/v${{ steps.version.outputs.version }}/changelog/polo.md)
            - [marco-core changelog](https://github.com/Ranrar/marco-core/blob/main/CHANGELOG.md)

            ### Downloads
            - **Linux**: `marco-suite_*_linux_amd64.deb`
            - **Windows**: `marco-suite_*_windows_amd64.zip`

            If something feels off, [open an issue](https://github.com/Ranrar/Marco/issues/new) — feedback is always welcome.

            Commit: ${{ github.sha }}
            Built: ${{ github.run_id }}
